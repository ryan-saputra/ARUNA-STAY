<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Aruna Stay</title>
  <meta name="description" content="Halaman login website hotel Aruna Stay." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="page-header">
    <nav class="container nav-simple" aria-label="Navigasi halaman login">
      <a class="brand-dark" href="index.html">Aruna Stay</a>
      <a class="link-back" href="index.html">Kembali ke Beranda</a>
    </nav>
  </header>

  <main>
    <section class="section" aria-labelledby="judul-login">
      <div class="container form-container">
        <h1 id="judul-login">Login Akun</h1>
        <p>Masuk untuk melihat reservasi dan riwayat pemesanan Anda.</p>

        <form class="form-card" action="#" method="post">
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="nama@email.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Masukkan password" required />
          </div>

          <button class="button button-submit" type="submit">Login</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p><strong>Aruna Stay</strong> · Hotel nyaman untuk perjalanan Anda</p>
      <p>Email: hello@arunastay.id · Telp: (022) 1234 5678</p>
    </div>
  </footer>
</body>
</html>
